<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>💍 Will You Be My Valentine?</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}

    body{
      min-height:100vh;
      background:linear-gradient(160deg,#1a0010 0%,#3d0025 40%,#6b0f3a 70%,#c0395a 100%);
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      font-family:'Lato',sans-serif;overflow:hidden;
    }

    /* Starfield */
    .stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
    .star{position:absolute;background:white;border-radius:50%;animation:twinkle ease-in-out infinite;}
    @keyframes twinkle{0%,100%{opacity:0.15;transform:scale(1);}50%{opacity:1;transform:scale(1.4);}}

    /* Floating petals */
    .petal{position:absolute;font-size:1.2rem;animation:petalFall linear infinite;opacity:0;}
    @keyframes petalFall{
      0%  {transform:translateY(-5vh) rotate(0deg) translateX(0);opacity:0;}
      10% {opacity:0.7;}
      90% {opacity:0.4;}
      100%{transform:translateY(105vh) rotate(360deg) translateX(60px);opacity:0;}
    }

    /* Glowing orbs */
    .orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;animation:orbPulse ease-in-out infinite;}
    @keyframes orbPulse{0%,100%{transform:scale(1);opacity:0.18;}50%{transform:scale(1.2);opacity:0.28;}}

    /* Card */
    .card{
      position:relative;z-index:10;
      background:linear-gradient(145deg,rgba(255,255,255,0.10),rgba(255,255,255,0.05));
      backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
      border-radius:40px;
      padding:58px 64px 52px;
      text-align:center;
      box-shadow:
        0 0 0 1px rgba(255,180,210,0.25),
        0 30px 90px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.15);
      max-width:500px;width:92%;
      animation:cardIn 1.1s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    /* Shimmering border */
    .card::before{
      content:'';position:absolute;inset:-1px;border-radius:41px;
      background:linear-gradient(135deg,rgba(255,150,200,0.6),rgba(255,80,130,0.1),rgba(200,80,255,0.5),rgba(255,80,130,0.1),rgba(255,150,200,0.6));
      background-size:300% 300%;
      animation:shimmer 4s linear infinite;
      z-index:-1;pointer-events:none;
    }
    @keyframes shimmer{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
    @keyframes cardIn{
      from{opacity:0;transform:scale(0.75) translateY(50px);}
      to  {opacity:1;transform:scale(1) translateY(0);}
    }

    /* Ring icon */
    .ring-wrap{
      display:inline-block;margin-bottom:20px;
      animation:ringFloat 3s ease-in-out infinite;
      filter:drop-shadow(0 0 22px rgba(255,130,170,0.9));
    }
    @keyframes ringFloat{
      0%,100%{transform:translateY(0) rotate(-4deg);}
      50%    {transform:translateY(-14px) rotate(4deg);}
    }
    .ring-icon{font-size:5.2rem;}

    /* Decorative divider */
    .divider{
      display:flex;align-items:center;gap:12px;
      margin:0 auto 22px;width:80%;
    }
    .divider-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(255,180,210,0.5),transparent);}
    .divider-icon{font-size:0.9rem;opacity:0.7;}

    h1{
      font-family:'Playfair Display',serif;
      font-size:2.3rem;font-weight:700;
      color:#fff;
      margin-bottom:6px;line-height:1.3;
      text-shadow:0 0 40px rgba(255,130,170,0.8), 0 2px 4px rgba(0,0,0,0.4);
      letter-spacing:0.5px;
    }

    .subtitle-name{
      font-family:'Playfair Display',serif;
      font-style:italic;
      font-size:1.08rem;
      color:rgba(255,200,220,0.9);
      margin-bottom:20px;
      letter-spacing:1px;
    }

    .divider2{
      display:flex;align-items:center;gap:10px;
      margin:0 auto 26px;width:70%;
    }
    .divider2-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(255,180,210,0.4),transparent);}

    p.subtitle{
      font-family:'Playfair Display',serif;
      font-style:italic;
      font-size:1.08rem;
      color:rgba(255,220,235,0.88);
      margin-bottom:40px;line-height:2;
      text-shadow:0 1px 6px rgba(0,0,0,0.3);
    }

    /* Buttons */
    .btn-row{
      display:flex;gap:14px;
      justify-content:center;align-items:center;
      transition:gap 0.45s cubic-bezier(0.34,1.56,0.64,1);
    }
    .btn-yes{
      background:linear-gradient(135deg,#ff6b9d,#c0395a);
      color:white;border:none;padding:15px 36px;
      font-size:1.1rem;border-radius:50px;cursor:pointer;
      box-shadow:0 8px 30px rgba(192,57,90,0.55),inset 0 1px 0 rgba(255,255,255,0.2);
      transition:transform 0.25s,box-shadow 0.25s,padding 0.4s,font-size 0.4s,opacity 0.5s,background 0.6s;
      font-family:'Lato',sans-serif;font-weight:400;letter-spacing:0.5px;
    }
    .btn-yes:hover{transform:scale(1.12) translateY(-2px);box-shadow:0 16px 44px rgba(192,57,90,0.65),inset 0 1px 0 rgba(255,255,255,0.2);}
    .btn-yes2{
      background:linear-gradient(135deg,#a855f7,#7c3aed);
      color:white;border:none;padding:15px 36px;
      font-size:1.1rem;border-radius:50px;cursor:pointer;
      box-shadow:0 8px 30px rgba(124,58,237,0.5),inset 0 1px 0 rgba(255,255,255,0.2);
      transition:transform 0.25s,box-shadow 0.25s,padding 0.4s,opacity 0.5s;
      font-family:'Lato',sans-serif;font-weight:400;letter-spacing:0.5px;
    }
    .btn-yes2:hover{transform:scale(1.12) translateY(-2px);box-shadow:0 16px 44px rgba(124,58,237,0.6),inset 0 1px 0 rgba(255,255,255,0.2);}
    #noBtn{
      background:linear-gradient(135deg,#ff4e4e,#c0392b);
      color:white;border:none;
      padding:15px 32px;font-size:1.05rem;
      border-radius:50px;cursor:pointer;
      font-family:'Lato',sans-serif;
      box-shadow:0 8px 24px rgba(192,57,43,0.45),inset 0 1px 0 rgba(255,255,255,0.15);
      transition:transform 0.18s,opacity 0.4s;
      white-space:nowrap;letter-spacing:0.3px;
    }

    /* Floating pill */
    .float-msg{
      position:fixed;
      background:linear-gradient(135deg,#ff6b9d,#c0395a);
      color:white;padding:11px 26px;
      border-radius:50px;font-size:0.97rem;
      font-family:'Lato',sans-serif;
      pointer-events:none;z-index:9999;
      white-space:nowrap;
      box-shadow:0 6px 24px rgba(192,57,90,0.5);
    }

    /* Success */
    .success-card{display:none;flex-direction:column;align-items:center;}
    .success-card h1{color:#fff;font-size:2.4rem;margin:20px 0 12px;}
    .success-card p{font-size:1.1rem;color:rgba(255,220,235,0.9);line-height:1.9;}
    canvas{position:fixed;top:0;left:0;pointer-events:none;z-index:999;}
  </style>
</head>
<body>

<div class="stars" id="starsContainer"></div>
<div class="orb" style="width:400px;height:400px;background:radial-gradient(circle,#c0395a,transparent);top:-100px;left:-100px;animation-duration:7s;"></div>
<div class="orb" style="width:350px;height:350px;background:radial-gradient(circle,#7c3aed,transparent);bottom:-80px;right:-80px;animation-duration:9s;animation-delay:3s;"></div>
<div class="orb" style="width:250px;height:250px;background:radial-gradient(circle,#ff6b9d,transparent);bottom:20%;left:10%;animation-duration:11s;animation-delay:1s;"></div>

<div id="petalsContainer" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;overflow:hidden;"></div>

<!-- Main Card -->
<div class="card" id="mainCard">
  <div class="ring-wrap"><span class="ring-icon">💍</span></div>

  <div class="divider">
    <div class="divider-line"></div>
    <span class="divider-icon">🌹</span>
    <div class="divider-line"></div>
  </div>

  <h1>Will You Be My Valentine?</h1>
  <p class="subtitle-name">~ for this and the next 6 lives ~</p>

  <div class="divider2">
    <div class="divider2-line"></div>
    <span style="font-size:0.75rem;opacity:0.5;color:#ffd0e0;">✦</span>
    <div class="divider2-line"></div>
  </div>

  <p class="subtitle">You are my home, my heart,<br>my everything. 💕</p>

  <div class="btn-row" id="btnRow">
    <button class="btn-yes"  id="yesBtn" onclick="sayYes()">💖 Yes!</button>
    <button class="btn-yes2" id="ofcBtn" onclick="sayYes()">🌹 Of Course!</button>
    <button id="noBtn" onmouseover="runAway(event)" ontouchstart="runAway(event)">No 🙈</button>
  </div>
</div>

<!-- Success -->
<div class="card success-card" id="successCard">
  <div class="ring-wrap"><span class="ring-icon">🥰</span></div>
  <h1>She said YES!! 💍</h1>
  <p>You just made me the happiest person alive! 🌹<br>
     I promise to love you every single day of my life. 💕<br>
     Forever yours. Always. ❤️</p>
  <div style="font-size:3rem;margin-top:28px;">🎊💑🎉💍🎊</div>
</div>

<canvas id="confettiCanvas"></canvas>

<script>
  let noCount=0,hasRunOnce=false,merged=false;
  const TOTAL_NO=8,FADE_AFTER=5;

  // Stars
  const sc=document.getElementById('starsContainer');
  for(let i=0;i<120;i++){
    const s=document.createElement('div');
    s.className='star';
    const size=0.8+Math.random()*2.2;
    s.style.cssText=`width:${size}px;height:${size}px;top:${Math.random()*100}vh;left:${Math.random()*100}vw;animation-duration:${2+Math.random()*4}s;animation-delay:${Math.random()*5}s;`;
    sc.appendChild(s);
  }

  // Petals
  const pc=document.getElementById('petalsContainer');
  const petals=['🌸','🌹','✨','💮','🌺'];
  for(let i=0;i<18;i++){
    const p=document.createElement('div');
    p.className='petal';
    p.textContent=petals[Math.floor(Math.random()*petals.length)];
    p.style.left=Math.random()*100+'vw';
    p.style.fontSize=(0.9+Math.random()*1.4)+'rem';
    p.style.animationDuration=(7+Math.random()*10)+'s';
    p.style.animationDelay=(Math.random()*12)+'s';
    pc.appendChild(p);
  }

  const noBtn=document.getElementById('noBtn');
  const btnRow=document.getElementById('btnRow');
  const yesBtn=document.getElementById('yesBtn');
  const ofcBtn=document.getElementById('ofcBtn');

  const msgs=[
    "Hey you Pookie! 💕","No is not an option! 😂",
    "Try harder Pookie 🌹","Always YES for you 💖",
    "Running like her doubts! 😄","Only love exists here 💕",
    "Click Yes, Pookie! 💍","You can't escape love ❤️",
    "Catch me if you can 😂💕","She was always saying YES 🥰"
  ];

  function spawnMsg(text,fromX,fromY){
    const el=document.createElement('div');
    el.className='float-msg';
    el.textContent=text;
    document.body.appendChild(el);
    el.style.left=(fromX-el.offsetWidth/2-10)+'px';
    el.style.top=(fromY-20)+'px';
    el.style.opacity='1';
    el.style.transform='translateY(0px) scale(1)';
    el.style.transition='none';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      el.style.transition='transform 1.8s cubic-bezier(0.25,0.46,0.45,0.94),opacity 1.8s ease';
      el.style.transform='translateY(-95px) scale(0.85)';
      el.style.opacity='0';
    }));
    setTimeout(()=>el.remove(),2000);
  }

  function bringCloser(){
    btnRow.style.gap=Math.max(0,14-noCount*2)+'px';
    if(noCount>=4&&noCount<7){
      const pad=Math.max(8,36-(noCount-3)*8);
      yesBtn.style.padding='15px '+pad+'px';
      ofcBtn.style.padding='15px '+pad+'px';
    }
    if(noCount>=7&&!merged){
      merged=true;
      ofcBtn.style.opacity='0';ofcBtn.style.pointerEvents='none';
      setTimeout(()=>{
        yesBtn.textContent='💍 Yes, Of Course!';
        yesBtn.style.background='linear-gradient(135deg,#ff6b9d,#7c3aed)';
        yesBtn.style.padding='16px 48px';yesBtn.style.fontSize='1.2rem';
        yesBtn.style.boxShadow='0 10px 36px rgba(192,57,90,0.55)';
        ofcBtn.style.display='none';
      },420);
    }
  }

  function runAway(e){
    if(e) e.preventDefault();
    noCount++;
    if(!hasRunOnce){
      hasRunOnce=true;
      const rect=noBtn.getBoundingClientRect();
      noBtn.style.position='fixed';
      noBtn.style.left=rect.left+'px';
      noBtn.style.top=rect.top+'px';
      noBtn.style.zIndex='200';
      noBtn.parentNode.removeChild(noBtn);
      document.body.appendChild(noBtn);
    }
    const rect=noBtn.getBoundingClientRect();
    const fromX=rect.left+rect.width/2;
    const fromY=rect.top;
    noBtn.style.transition='left 0.38s cubic-bezier(0.34,1.56,0.64,1),top 0.38s cubic-bezier(0.34,1.56,0.64,1),transform 0.3s,opacity 0.4s';
    noBtn.style.left=Math.floor(Math.random()*(window.innerWidth-150))+'px';
    noBtn.style.top=Math.floor(Math.random()*(window.innerHeight-65))+'px';
    noBtn.style.transform='scale('+Math.max(0.42,1-noCount*0.07)+')';
    noBtn.style.opacity=noCount>FADE_AFTER?String(Math.max(0.08,1-(noCount-FADE_AFTER)*0.33)):'1';
    spawnMsg(msgs[noCount%msgs.length],fromX,fromY);
    bringCloser();
    if(noCount>=TOTAL_NO){
      noBtn.style.opacity='0';noBtn.style.pointerEvents='none';
      setTimeout(()=>spawnMsg("No has left the chat! 💍 Only YES!",window.innerWidth/2,window.innerHeight/2),300);
    }
  }

  function sayYes(){
    document.getElementById('mainCard').style.display='none';
    if(noBtn.parentNode) noBtn.parentNode.removeChild(noBtn);
    const s=document.getElementById('successCard');
    s.style.display='flex';
    launchConfetti();
  }

  function launchConfetti(){
    const canvas=document.getElementById('confettiCanvas');
    const ctx=canvas.getContext('2d');
    canvas.width=window.innerWidth;canvas.height=window.innerHeight;
    const colors=['#ff6b9d','#c0395a','#ffcce0','#ff9ec4','#fff','#ffd700','#a855f7','#da70d6'];
    const pieces=Array.from({length:220},()=>({
      x:Math.random()*canvas.width,y:Math.random()*canvas.height-canvas.height,
      r:5+Math.random()*9,d:2+Math.random()*4,
      color:colors[Math.floor(Math.random()*colors.length)],
      tilt:Math.random()*10-5,tiltSpeed:0.1+Math.random()*0.25,
      shape:Math.random()>0.5?'circle':'rect'
    }));
    let frame=0;
    function draw(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      pieces.forEach(p=>{
        ctx.beginPath();ctx.fillStyle=p.color;
        if(p.shape==='circle') ctx.arc(p.x,p.y,p.r,0,2*Math.PI);
        else ctx.rect(p.x,p.y,p.r*1.5,p.r*0.7);
        ctx.fill();
        p.y+=p.d;p.tilt+=p.tiltSpeed;p.x+=Math.sin(frame*0.04)*2;
        if(p.y>canvas.height){p.y=-10;p.x=Math.random()*canvas.width;}
      });
      frame++;
      if(frame<430) requestAnimationFrame(draw);
      else ctx.clearRect(0,0,canvas.width,canvas.height);
    }
    draw();
  }
</script>
</body>
</html>
